services:
  - type: web
    name: rgpv-app
    runtime: python311
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 5000
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    routes:
      - path: /
        matchType: Prefix
